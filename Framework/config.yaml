functional_checks:
  rules:
  - rule_id     : F01
    name        : "Null check on key fields"
    rule_type   : null_check
    threshold   : 0
    object      : 
      - name    : UDX_CORE.STAGE.STG_UOR_GALAXY_GENERATED_STATEMENTS
        columns : [record_content]

      - name    : UDX_CORE.CONFORM.GENERATED_STATEMENTS
        columns : [source_ids]
    object_type : table

        
