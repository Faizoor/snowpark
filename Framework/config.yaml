# Testing Framework Configuration for Maximo Application
# ══════════════════════════════════════════════════════════════════════
application: Maximo
database   : UDX_CORE        
schema     : Conform 

#------------------------------Test Rules---------------------------------


sanity_checks:
  rules:
  - rule_id     : S01
    name        : "Collection Table Exists"
    rule_type   : table_exists
    object      : UUDX_CORE.STAGE.TABLE_THAT_DOES_NOT_EXIST
    object_type : table

  - rule_id     : S02
    name        : "Error Table Exists"
    rule_type   : table_exists
    object      : UDX_CORE.ERR.UOR_GALAXY_GENERATED_STATEMENTS_ERROR
    object_type : table

  - rule_id     : S03
    name        : "Conform Table Exists"
    rule_type   : table_exists
    object      : UDX_CORE.CONFORM.GENERATED_STATEMENTS
    object_type : table

