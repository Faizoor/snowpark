# ══════════════════════════════════════════════════════════════════════
# Testing Framework Configuration for Maximo Application
# ══════════════════════════════════════════════════════════════════════
application: Maximo
database   : UDX_CORE        
schema     : Conform    

# ── Quick Sanity Checks ──
sanity_checks:
  rules:
    - check: stage_exists
      severity: FAIL
      objects:
        - name    : SOURCE_FILE_STG
          database: CONFIG
          schema  : METADATA

    - check: table_exists
      severity: FAIL
      objects:
        - name    : STG_UOR_GALAXY_GENERATED_STATEMENTS
          database: UDX_CORE
          schema  : STAGE

        - name    : UOR_GALAXY_GENERATED_STATEMENTS_ERROR
          database: UDX_CORE
          schema  : ERR

        - name    : GENERATED_STATEMENTS
          database: UDX_CORE
          schema  : CONFORM

# ── Table Data Quality Checks ──
tables:
  - name    : GENERATED_STATEMENTS
    database: UDX_CORE
    schema  : CONFORM
    enabled : True  
    rules:
      - check     : null_check     
        columns   : [order_id, customer_id, amount, order_date]
        threshold : 0.0
        severity  : FAIL          
                     
      - check    : unique_check   
        columns  : [order_id]
        threshold: 0.0
        severity : FAIL

rules
  rule id 
  rule type - sanity | functional
  object - complete table name
  check 
  object type   - table, stage, schema 
        

          
  